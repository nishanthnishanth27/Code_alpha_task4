        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .player {
            background: rgba(20, 20, 40, 0.9);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Album Art */
        .album-art-container {
            position: relative;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vinyl {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a3e, #000);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7),
                        inset 0 0 40px rgba(255, 255, 255, 0.05),
                        inset -10px -10px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        .vinyl.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .vinyl::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 35% 35%, #ffd700, #ff6b00);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
            z-index: 3;
        }

        .vinyl::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 35px;
            background: #1a1a2e;
            border-radius: 50%;
            z-index: 4;
        }

        .vinyl-groove {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle,
                transparent 0,
                transparent 8px,
                rgba(255, 255, 255, 0.03) 8px,
                rgba(255, 255, 255, 0.03) 9px
            );
            z-index: 2;
        }

        /* Song Info */
        .song-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .song-artist {
            font-size: 14px;
            color: #b0b0d0;
            font-weight: 500;
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 25px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ffd700);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
        }

        /* Volume Control */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .volume-icon {
            font-size: 16px;
        }

        .volume-slider {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ffd700);
            border-radius: 3px;
            width: 70%;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-play {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b00, #ffd700);
            border: none;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.4);
        }

        .btn-play:hover {
            background: linear-gradient(135deg, #ff7a1a, #ffe000);
            box-shadow: 0 12px 35px rgba(255, 107, 0, 0.5);
            transform: scale(1.05);
        }

        /* Playlist */
        .playlist-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .playlist-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #b0b0d0;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .playlist-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .playlist-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .playlist-container.open {
            max-height: 400px;
        }

        .playlist {
            list-style: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .playlist-item {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s ease;
            color: #b0b0d0;
            border-left: 3px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .playlist-item.active {
            background: rgba(255, 107, 0, 0.2);
            color: #ffd700;
            border-left-color: #ff6b00;
            font-weight: 600;
        }

        /* Features Row */
        .features {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            font-size: 12px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .feature:hover {
            color: #b0b0d0;
        }

        .feature.active {
            color: #ffd700;
        }

        .checkbox {
            width: 14px;
            height: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .feature.active .checkbox {
            background: #ffd700;
            border-color: #ffd700;
            color: #000;
        }

        /* Hidden audio element */
        audio {
            display: none;
        }

        @media (max-width: 480px) {
            .player {
                padding: 30px 20px;
            }

            .vinyl {
                width: 150px;
                height: 150px;
            }

            .song-title {

            }

            .controls {
                gap: 10px;
            }

            .btn {

                height: 45px;
                font-size: 18px;
            }

            .btn-play {
                width: 55px;
                height: 55px;
                font-size: 20px;
            }
        }
    </style>
</head>

        const playlistToggleBtn = document.getElementById('playlistToggleBtn');
        const playlistUL = document.getElementById('playlistUL');
        const autoplayFeature = document.getElementById('autoplayFeature');
        const loopFeature = document.getElementById('loopFeature');

        // Initialize
        function init() {
            loadSong(currentSongIndex);
            renderPlaylist();
            setupEventListeners();
            audio.volume = 0.7;
            volumeFill.style.width = '70%';
        }

        // Load song
        function loadSong(index) {
            const song = songs[index];
            audio.src = song.url;
            songTitle.textContent = song.title;
            songArtist.textContent = song.artist;
            
            // Update active playlist item
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        // Render playlist
        function renderPlaylist() {
            playlistUL.innerHTML = songs.map((song, index) => `
                <li class="playlist-item ${index === currentSongIndex ? 'active' : ''}" data-index="${index}">
                    <span style="color: #888; margin-right: 8px;">${String(index + 1).padStart(2, '0')}.</span>
                    <span>${song.title}</span>
                </li>
            `).join('');

            // Add click handlers
            document.querySelectorAll('.playlist-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentSongIndex = parseInt(item.dataset.index);
                    loadSong(currentSongIndex);
                    playSong();
                });
            });
        }

        // Play song
        function playSong() {
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸️';
            vinyl.classList.add('playing');
        }

        // Pause song
        function pauseSong() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶️';
            vinyl.classList.remove('playing');
        }

        // Toggle play/pause
        function togglePlay() {
            isPlaying ? pauseSong() : playSong();
        }

        // Next song
        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            playSong();
        }

        // Previous song
        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            playSong();
        }

        // Format time
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${String(secs).padStart(2, '0')}`;
        }

        // Update progress bar
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }

        // Update volume fill
        function updateVolume(e) {
            const rect = volumeSlider.getBoundingClientRect();
            const percent = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
            audio.volume = percent / 100;
            volumeFill.style.width = `${percent}%`;
        }

        // Update progress on click
        function seekSong(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        // Setup event listeners
        function setupEventListeners() {
            playBtn.addEventListener('click', togglePlay);
            nextBtn.addEventListener('click', nextSong);
            prevBtn.addEventListener('click', prevSong);

            progressBar.addEventListener('click', seekSong);
            volumeSlider.addEventListener('click', updateVolume);

            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audio.duration);
            });

            // Autoplay next song when current ends
            audio.addEventListener('ended', () => {
                if (autoplay) {
                    if (currentSongIndex === songs.length - 1 && !loopPlaylist) {
                        pauseSong();
                    } else {
                        nextSong();
                    }
                }
            });

            // Playlist toggle
            playlistToggleBtn.addEventListener('click', () => {
                playlistContainer.classList.toggle('open');
                playlistToggleBtn.textContent = playlistContainer.classList.contains('open') 
                    ? '📋 Hide Playlist' 
                    : '📋 Show Playlist';
            });

            // Toggle features
            autoplayFeature.addEventListener('click', () => {
                autoplay = !autoplay;
                autoplayFeature.classList.toggle('active', autoplay);
            });

            loopFeature.addEventListener('click', () => {
                loopPlaylist = !loopPlaylist;
                loopFeature.classList.toggle('active', loopPlaylist);
            });
        }

        // Start
        init();
    </script>
</body>
</html>
