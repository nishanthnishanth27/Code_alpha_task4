<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicVault - Universal Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --primary: #ff6b6b;
            --secondary: #ffd93d;
            --accent: #6bcf7f;
            --dark: #0a0e27;
            --darker: #050812;
            --light: #e8eef5;
            --text: #ffffff;
            --text-secondary: #b0b9cc;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text);
            overflow: hidden;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader {
            text-align: center;
        }

        .music-notes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .music-note {
            font-size: 50px;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .music-note:nth-child(1) {
            animation-delay: 0s;
        }

        .music-note:nth-child(2) {
            animation-delay: 0.2s;
        }

        .music-note:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-20px);
                opacity: 1;
            }
        }

        .loader-text {
            font-size: 18px;
            color: var(--secondary);
            font-weight: 600;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Main Container */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: rgba(5, 8, 18, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 25px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .category-title {
            grid-column: 1 / -1;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .category-btn {
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: center;
            flex-direction: column;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark);
            border-color: transparent;
            font-weight: 700;
            grid-column: 1 / -1;
        }

        .category-icon {
            font-size: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 14, 39, 0.4);
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 14, 39, 0.6);
            backdrop-filter: blur(10px);
        }

        .header-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            width: 220px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.2);
        }

        /* Songs Display Area */
        .content-area {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px 30px;
            overflow: hidden;
        }

        /* Songs Grid */
        .songs-list {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding-right: 10px;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .song-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 107, 107, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.2);
        }

        .song-card.active {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 217, 61, 0.2));
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .song-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .song-flag {
            font-size: 28px;
            min-width: 35px;
        }

        .play-icon {
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.3s ease;
            width: 30px;
            text-align: right;
        }

        .song-card:hover .play-icon {
            opacity: 1;
        }

        .song-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .song-artist {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-duration {
            font-size: 10px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
            width: fit-content;
        }

        /* Player Bar */
        .player-bar {
            padding: 20px 30px;
            background: rgba(5, 8, 18, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-album {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
            animation: spin 3s linear infinite;
            animation-play-state: paused;
            flex-shrink: 0;
        }

        .player-album.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .control-btn.play {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            font-size: 22px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .control-btn.play:hover {
            background: linear-gradient(135deg, #ff7a7a, #ffe550);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.5);
            transform: scale(1.05);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 150px;
        }

        .volume-slider {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            border-radius: 3px;
            width: 70%;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 15px;
                max-height: 40vh;
                overflow-y: auto;
            }

            .categories {
                grid-template-columns: repeat(3, 1fr);
            }

            .songs-list {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                padding: 10px 15px;
                gap: 10px;
            }

            .player-bar {
                padding: 15px;
            }

            .header {
                padding: 15px;
                flex-direction: column;
                gap: 15px;
            }

            .search-box {
                width: 100%;
            }
        }
    </style>
</head>

        // State
        let currentCategory = 'all';
        let currentSongIndex = 0;
        let isPlaying = false;
        let filteredSongs = [...allSongs];

        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const songsList = document.getElementById('songsList');
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const searchBox = document.getElementById('searchBox');
        const headerTitle = document.getElementById('headerTitle');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const playerAlbum = document.getElementById('playerAlbum');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeFill = document.getElementById('volumeFill');

        // Initialize
        function init() {
            // Hide loading screen after 2 seconds
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                renderSongs();
            }, 1800);

            setupEventListeners();
            audio.volume = 0.7;
            volumeFill.style.width = '70%';
        }

        // Render songs
        function renderSongs() {
            songsList.innerHTML = filteredSongs.map((song, index) => `
                <div class="song-card" data-index="${index}" onclick="selectSong(${index})">
                    <div class="song-card-header">
                        <span class="song-flag">${song.flag}</span>
                        <span class="play-icon">▶️</span>
                    </div>
                    <div class="song-title">${song.title}</div>
                    <div class="song-artist">${song.artist}</div>
                    <div class="song-duration">${song.duration}</div>
                </div>
            `).join('');
        }

        // Select song
        window.selectSong = function(index) {
            currentSongIndex = index;
            loadSong(currentSongIndex);
            playSong();
            updateActiveCard();
        };

        // Load song
        function loadSong(index) {
            const song = filteredSongs[index];
            audio.src = song.url;
            playerTitle.textContent = song.title;
            playerArtist.textContent = song.artist;
            playerAlbum.textContent = song.flag;
        }

        // Play song
        function playSong() {
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸️';
            playerAlbum.classList.add('playing');
        }

        // Pause song
        function pauseSong() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶️';
            playerAlbum.classList.remove('playing');
        }

        // Toggle play/pause
        function togglePlay() {
            isPlaying ? pauseSong() : playSong();
        }

        // Next song
        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % filteredSongs.length;
            loadSong(currentSongIndex);
            playSong();
            updateActiveCard();
        }

        // Previous song
        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + filteredSongs.length) % filteredSongs.length;
            loadSong(currentSongIndex);
            playSong();
            updateActiveCard();
        }

        // Update active card
        function updateActiveCard() {
            document.querySelectorAll('.song-card').forEach((card, i) => {
                card.classList.toggle('active', i === currentSongIndex);
            });
        }

        // Format time
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${String(secs).padStart(2, '0')}`;
        }

        // Update progress
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }

        // Seek song
        function seekSong(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        // Update volume
        function updateVolume(e) {
            const rect = volumeSlider.getBoundingClientRect();
            const percent = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
            audio.volume = percent / 100;
            volumeFill.style.width = `${percent}%`;
        }

        // Filter songs
        function filterSongs() {
            const query = searchBox.value.toLowerCase();
            if (currentCategory === 'all') {
                filteredSongs = [...allSongs];
            } else {
                filteredSongs = [...songDatabase[currentCategory]];
            }
            if (query) {
                filteredSongs = filteredSongs.filter(song => 
                    song.title.toLowerCase().includes(query) || 
                    song.artist.toLowerCase().includes(query)
                );
            }
            renderSongs();
            currentSongIndex = 0;
        }

        // Setup event listeners
        function setupEventListeners() {
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const category = btn.dataset.category;
                    currentCategory = category;
                    
                    if (category === 'all') {
                        filteredSongs = [...allSongs];
                        headerTitle.textContent = '🌍 All Music';
                    } else {
                        filteredSongs = [...songDatabase[category]];
                        headerTitle.textContent = `${btn.textContent}`;
                    }
                    renderSongs();
                    currentSongIndex = 0;
                });
            });

            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevSong);
            nextBtn.addEventListener('click', nextSong);

            searchBox.addEventListener('input', filterSongs);

            progressBar.addEventListener('click', seekSong);
            volumeSlider.addEventListener('click', updateVolume);

            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', nextSong);
            audio.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audio.duration);
            });
        }

        // Start app
        init();
    </script>
</body>
</html>
